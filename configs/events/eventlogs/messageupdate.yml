name: eventlogs-message-update
trigger: messageUpdate
conditions:
  - id: textLengthAbove
    args:
      text: "%meta_event_log_channel%"
      amount: 0
actions:
  - id: sendMessage
    target:
      channel: "%meta_event_log_channel%"
    args:
      components:
        - type: container
          color: "#ffa500"
          components:
            - type: text-display
              content: "## Message Edited"
            - type: text-display
              content: "**Author:** %user_mention% (`%user_id%`)\n**Channel:** %channel_mention%\n**Message ID:** `%message_id%`\n**Before:** %message_old_content%\n**After:** %message_content%"
            - type: separator
              spacing: 1
            - type: text-display
              content: "Message Edited - %date% at %hour%:%minute%"
