name: eventlogs-message-delete
trigger: messageDelete
conditions:
  - id: textLengthAbove
    args:
      text: "%meta_event_log_channel%"
      amount: 0
actions:
  - id: sendMessage
    target:
      channel: "%meta_event_log_channel%"
    args:
      components:
        - type: container
          color: "#ed4245"
          components:
            - type: text-display
              content: "## Message Deleted"
            - type: text-display
              content: "**Author:** %user_mention% (`%user_id%`)\n**Channel:** %channel_mention%\n**Message ID:** `%message_id%`\n**Content:** %message_content%"
            - type: separator
              spacing: 1
            - type: text-display
              content: "Message Deleted - %date% at %hour%:%minute%"
