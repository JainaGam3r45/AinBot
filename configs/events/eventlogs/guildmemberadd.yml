name: eventlogs-guild-member-add
trigger: guildMemberAdd
conditions:
  - id: textLengthAbove
    args:
      text: "%meta_event_log_channel%"
      amount: 0
actions:
  - id: sendMessage
    target:
      channel: "%meta_event_log_channel%"
    args:
      components:
        - type: container
          color: "#57f287"
          components:
            - type: text-display
              content: "## Member Joined"
            - type: text-display
              content: "**User:** %user_mention%\n**Username:** `%user_username%`\n**User ID:** `%user_id%`\n**Server:** `%guild_name%`"
            - type: separator
              spacing: 1
            - type: text-display
              content: "Member Joined - %date% at %hour%:%minute%"
